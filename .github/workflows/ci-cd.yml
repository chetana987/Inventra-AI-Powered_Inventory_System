name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME || 'inventra' }}/inventra-app

jobs:
  build:
    name: Build, Test & Package
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: inventra
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Run Unit Tests
        run: mvn clean test -Dspring.profiles.active=test
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'test-key' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-that-is-at-least-32-characters-long-for-hs256' }}

      - name: Generate JAR
        run: mvn clean package -DskipTests -q

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: inventra-jar
          path: target/*.jar
          retention-days: 7

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
                       -t ${{ env.DOCKER_IMAGE }}:latest \
                       -f Dockerfile .

      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.DOCKER_IMAGE }}:latest
