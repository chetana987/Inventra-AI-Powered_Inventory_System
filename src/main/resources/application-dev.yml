server:
  port: 8082

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/inventra_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:chetana}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

logging:
  level:
    com.inventra: DEBUG
    org.hibernate.SQL: DEBUG
